<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333" />
        </marker>
        <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8fa3ad" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <style>
        .line { fill: none; stroke: #333; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .dashed { stroke-dasharray: 5,5; }
        .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #454545; }
        .highlight { stroke: #8fa3ad; stroke-width: 3; }
        .accent { fill: #9fb3a6; stroke: none; opacity: 0.2; }
        .badge { font-size: 11px; fill: #8fa3ad; font-family: -apple-system, sans-serif; }
        .metric { font-size: 11px; fill: #c4a29e; font-family: -apple-system, sans-serif; }
        .title { font-size: 16px; font-weight: 600; fill: #454545; }
        .box { fill: #f8f8f8; stroke: #ccc; stroke-width: 1; }
    </style>
    
    <text x="400" y="30" text-anchor="middle" class="title">DeepSeek-R1 Training Pipeline</text>
    
    <!-- Stage 1: Cold Start + RL -->
    <rect x="50" y="60" width="200" height="80" class="box" />
    <text x="150" y="85" text-anchor="middle" class="text">Cold Start Data</text>
    <text x="150" y="105" text-anchor="middle" class="badge">人类对话式推理</text>
    <text x="150" y="125" text-anchor="middle" class="metric">+ RL (GRPO)</text>
    
    <line x1="250" y1="100" x2="290" y2="100" class="line" marker-end="url(#arrow)" />
    
    <!-- Stage 2: Rejection Sampling + SFT -->
    <rect x="300" y="60" width="200" height="80" class="box" />
    <text x="400" y="85" text-anchor="middle" class="text">Rejection Sampling</text>
    <text x="400" y="105" text-anchor="middle" class="badge">过滤不合适回答</text>
    <text x="400" y="125" text-anchor="middle" class="metric">+ SFT</text>
    
    <line x1="500" y1="100" x2="540" y2="100" class="line" marker-end="url(#arrow)" />
    
    <!-- Stage 3: Preference RL -->
    <rect x="550" y="60" width="200" height="80" class="box" style="stroke:#8fa3ad;stroke-width:2" />
    <text x="650" y="85" text-anchor="middle" class="text">Preference RL</text>
    <text x="650" y="105" text-anchor="middle" class="badge" style="fill:#8fa3ad">对齐人类偏好</text>
    <text x="650" y="125" text-anchor="middle" class="metric" style="fill:#8fa3ad">Model Reward</text>
    
    <!-- DeepSeek-R1 Output -->
    <rect x="300" y="200" width="200" height="60" class="box" style="stroke:#5a9e6f;stroke-width:3" />
    <text x="400" y="225" text-anchor="middle" class="text" style="fill:#5a9e6f">DeepSeek-R1</text>
    <text x="400" y="245" text-anchor="middle" class="badge" style="fill:#5a9e6f">推理 + 写作 + 安全</text>
    
    <!-- Arrows from stages -->
    <line x1="150" y1="140" x2="400" y2="200" class="line" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="400" y1="140" x2="400" y2="200" class="line" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="650" y1="140" x2="400" y2="200" class="line" stroke-width="2" marker-end="url(#arrow-blue)" />
    
    <!-- Legend -->
    <rect x="50" y="300" width="700" height="80" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,2" />
    <text x="400" y="325" text-anchor="middle" class="badge">关键创新</text>
    <text x="400" y="345" text-anchor="middle" class="text">跳过 SFT，直接用 RL 让模型自主学会推理</text>
    <text x="400" y="365" text-anchor="middle" class="text">多阶段训练：推理能力 + 语言一致性 + 人类偏好对齐</text>
</svg>